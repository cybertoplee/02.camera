<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGDesk AI CCTV Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&family=Share+Tech+Mono&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .digital-font { font-family: 'Share Tech Mono', 'Orbitron', monospace; }
        .blink { animation: blinker 0.8s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
        .beacon { width: 40px; height: 40px; border-radius: 50%; background: #dc2626; box-shadow: 0 0 20px #ef4444; }
        .focus-frame { position: absolute; border: 3px solid yellow; display: none; transition: all 0.2s ease-out; border-radius: 8px; box-shadow: 0 0 15px rgba(255, 255, 0, 0.6); }
        .recording-icon { width: 12px; height: 12px; border-radius: 50%; background: red; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

    <header class="bg-gray-900/90 backdrop-blur border-b border-gray-800 p-4 flex justify-between items-center shadow-lg relative z-20">
        <h1 class="text-xl font-extrabold text-blue-400 tracking-wider flex items-center gap-2 digital-font">
            <span class="w-3 h-3 rounded-full bg-blue-500 animate-pulse shadow-[0_0_10px_#3b82f6]"></span>
            EGDESK AI CCTV SYSTEM
        </h1>
        <nav class="flex gap-1 md:gap-2">
            <button onclick="showPage('cctv')" class="hover:text-blue-400 font-bold px-3 py-1.5 rounded transition-all text-sm md:text-base">CCTV AI</button>
            <button onclick="showPage('records')" class="hover:text-blue-400 font-bold px-3 py-1.5 rounded transition-all text-sm md:text-base">녹화정보</button>
            <button onclick="showPage('events')" class="hover:text-blue-400 font-bold px-3 py-1.5 rounded transition-all text-sm md:text-base">이벤트 정보</button>
            <button onclick="showPage('settings')" class="hover:text-blue-400 font-bold px-3 py-1.5 rounded transition-all text-sm md:text-base">설정</button>
        </nav>
    </header>

    <main id="main-content" class="flex-grow p-6 flex flex-col justify-center items-center">
        <!-- CCTV AI 페이지 -->
        <div id="cctv-page" class="page hidden w-full flex flex-col items-center">
            <!-- CCTV Video Container: Default to 1/2 size (max-w-2xl aspect-video) -->
            <div id="video-container" class="bg-black rounded-3xl overflow-hidden border-2 border-gray-800 flex items-center justify-center relative transition-all duration-500 ease-in-out w-full max-w-2xl aspect-video shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
                <video id="video-stream" class="w-full h-full object-cover" autoplay playsinline></video>
                <div id="rec-indicator" class="hidden absolute top-4 left-4 flex items-center gap-2 bg-black/60 px-3 py-1.5 rounded-full border border-red-500/30">
                    <div class="recording-icon blink"></div>
                    <span class="text-xs font-black text-red-500 digital-font tracking-widest">REC</span>
                </div>
                <div id="focus-frame" class="focus-frame w-24 h-24"></div>
                <div id="event-beacon" class="hidden absolute top-4 right-4 flex items-center gap-2">
                    <div class="beacon blink"></div>
                    <span class="font-extrabold text-red-500 text-sm animate-pulse">이상 감지!</span>
                </div>
            </div>
            
            <!-- Controls with Glowing Electronic Buttons and Bilingual labels -->
            <div class="mt-8 grid grid-cols-3 md:flex md:flex-wrap gap-4 justify-center w-full max-w-2xl px-4">
                <button onclick="startCamera()" class="digital-font bg-black/50 border border-emerald-500/50 text-emerald-400 hover:bg-emerald-500/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-[0_0_15px_rgba(16,185,129,0.1)] hover:shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all active:scale-95 cursor-pointer">
                    <span class="text-sm font-black tracking-widest uppercase">Start</span>
                    <span class="text-[10px] text-emerald-300/80 font-bold mt-1 font-sans">시작</span>
                </button>
                <button onclick="pauseCamera()" class="digital-font bg-black/50 border border-yellow-500/50 text-yellow-400 hover:bg-yellow-500/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-[0_0_15px_rgba(245,158,11,0.1)] hover:shadow-[0_0_20px_rgba(245,158,11,0.3)] transition-all active:scale-95 cursor-pointer">
                    <span class="text-sm font-black tracking-widest uppercase">Pause</span>
                    <span class="text-[10px] text-yellow-300/80 font-bold mt-1 font-sans">일시정지</span>
                </button>
                <button onclick="stopCamera()" class="digital-font bg-black/50 border border-red-500/50 text-red-400 hover:bg-red-500/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-[0_0_15px_rgba(239,68,68,0.1)] hover:shadow-[0_0_20px_rgba(239,68,68,0.3)] transition-all active:scale-95 cursor-pointer">
                    <span class="text-sm font-black tracking-widest uppercase">Stop</span>
                    <span class="text-[10px] text-red-300/80 font-bold mt-1 font-sans">중지</span>
                </button>
                <button onclick="makeFullScreen()" class="digital-font bg-black/50 border border-blue-500/50 text-blue-400 hover:bg-blue-500/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-[0_0_15px_rgba(59,130,246,0.1)] hover:shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all active:scale-95 cursor-pointer">
                    <span class="text-sm font-black tracking-widest uppercase">Full</span>
                    <span class="text-[10px] text-blue-300/80 font-bold mt-1 font-sans">전체화면</span>
                </button>
                <button onclick="revertSize()" class="digital-font bg-black/50 border border-teal-500/50 text-teal-400 hover:bg-teal-500/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-[0_0_15px_rgba(20,184,166,0.1)] hover:shadow-[0_0_20px_rgba(20,184,166,0.3)] transition-all active:scale-95 cursor-pointer">
                    <span class="text-sm font-black tracking-widest uppercase">Revert</span>
                    <span class="text-[10px] text-teal-300/80 font-bold mt-1 font-sans">나가기</span>
                </button>
                <button onclick="exitApp()" class="digital-font bg-black/50 border border-gray-600 text-gray-400 hover:bg-gray-700/20 px-4 py-2.5 rounded-2xl flex flex-col items-center shadow-md transition-all active:scale-95 cursor-pointer col-span-3 md:col-span-1">
                    <span class="text-sm font-black tracking-widest uppercase">Exit</span>
                    <span class="text-[10px] text-gray-400/80 font-bold mt-1 font-sans">시스템종료</span>
                </button>
            </div>
        </div>

        <!-- 녹화정보 페이지 -->
        <div id="records-page" class="page hidden w-full max-w-4xl">
            <h2 class="text-2xl font-black mb-6 text-blue-400 tracking-tight">녹화 저장소</h2>
            <div class="bg-gray-900 rounded-[32px] p-6 shadow-2xl border border-gray-800">
                <table class="w-full text-left">
                    <thead><tr class="text-gray-500 border-b border-gray-800"><th class="p-4 text-xs font-bold uppercase tracking-wider">일시</th><th class="p-4 text-xs font-bold uppercase tracking-wider">파일명</th><th class="p-4 text-xs font-bold uppercase tracking-wider">용량</th><th class="p-4 text-xs font-bold uppercase tracking-wider">기능</th></tr></thead>
                    <tbody id="record-list"></tbody>
                </table>
            </div>
        </div>

        <!-- 이벤트 정보 페이지 -->
        <div id="events-page" class="page hidden w-full max-w-4xl">
            <h2 class="text-2xl font-black mb-6 text-red-400 tracking-tight">이상 감지 로그</h2>
            <div class="bg-gray-900 rounded-[32px] p-6 shadow-2xl border border-gray-800">
                <table class="w-full text-left">
                    <thead><tr class="text-gray-500 border-b border-gray-800"><th class="p-4 text-xs font-bold uppercase tracking-wider">시간</th><th class="p-4 text-xs font-bold uppercase tracking-wider">유형</th><th class="p-4 text-xs font-bold uppercase tracking-wider">스냅샷</th><th class="p-4 text-xs font-bold uppercase tracking-wider">기능</th></tr></thead>
                    <tbody id="event-list"></tbody>
                </table>
            </div>
        </div>

        <!-- 설정 페이지 -->
        <div id="settings-page" class="page w-full max-w-2xl">
            <h2 class="text-2xl font-black mb-6 text-gray-300 tracking-tight">시스템 설정</h2>
            <div class="bg-gray-900 p-8 rounded-[32px] space-y-6 shadow-2xl border border-gray-800">
                <div>
                    <label class="block mb-3 text-gray-400 font-bold text-sm">녹화 저장 폴더 지정:</label>
                    <div class="flex gap-3">
                        <input type="text" id="save-path" readonly placeholder="폴더를 선택하세요." class="w-full p-4 bg-gray-950 rounded-2xl border border-gray-800 outline-none text-sm font-bold placeholder:text-gray-600">
                        <button onclick="selectFolder()" class="bg-blue-600 px-6 py-4 rounded-2xl hover:bg-blue-500 font-black text-sm whitespace-nowrap transition-all active:scale-95 shadow-[0_8px_16px_rgba(37,99,235,0.3)]">폴더 선택/생성</button>
                    </div>
                </div>
                <div id="storage-dashboard" class="hidden mt-6 border-t border-gray-800 pt-6">
                    <p class="font-black text-lg mb-4 text-blue-400 tracking-tight">스토리지 상태</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-950 p-6 rounded-2xl border border-gray-800 text-center flex flex-col gap-1"><span class="text-xs font-bold text-gray-500">가용 용량</span><span id="disk-space" class="text-yellow-400 font-extrabold text-2xl digital-font">0</span> <span class="text-xs font-bold text-gray-400 mt-1">GB</span></div>
                        <div class="bg-gray-950 p-6 rounded-2xl border border-gray-800 text-center flex flex-col gap-1"><span class="text-xs font-bold text-gray-500">예상 녹화 시간</span><span id="rec-time" class="text-green-400 font-extrabold text-2xl digital-font">0</span> <span class="text-xs font-bold text-gray-400 mt-1">분</span></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let isConfigured = false;
        let stream = null;
        let detectionInterval = null;
        let lastEventTime = 0;
        let recStartTime = null;
        let alarmSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        alarmSound.loop = true;

        async function selectFolder() {
            try {
                const dirHandle = await window.showDirectoryPicker();
                document.getElementById('save-path').value = dirHandle.name;
                isConfigured = true;
                document.getElementById('storage-dashboard').classList.remove('hidden');
                updateStorageMetrics();
                alert("폴더가 설정되었습니다.");
                showPage('cctv');
            } catch (err) { console.log("취소됨", err); }
        }

        function updateStorageMetrics() {
            document.getElementById('disk-space').innerText = (Math.random() * 500 + 100).toFixed(1);
            document.getElementById('rec-time').innerText = Math.floor(Math.random() * 800 + 200);
        }

        function showPage(id) {
            if (!isConfigured && id !== 'settings') {
                alert("설정 페이지에서 먼저 저장 폴더를 지정해주세요.");
                id = 'settings';
            }
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(id + '-page').classList.remove('hidden');

            if (id === 'records') {
                loadRecords();
            } else if (id === 'events') {
                loadEvents();
            }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                document.getElementById('video-stream').srcObject = stream;
                document.getElementById('rec-indicator').classList.remove('hidden');
                recStartTime = new Date();
                startDetection();
            } catch(e) { alert("카메라 접근 불가"); }
        }

        function startDetection() {
            if (detectionInterval) clearInterval(detectionInterval);
            detectionInterval = setInterval(async () => {
                const isAnomaly = Math.random() > 0.6;
                const focusFrame = document.getElementById('focus-frame');
                const eventBeacon = document.getElementById('event-beacon');

                if (isAnomaly) {
                    focusFrame.style.display = 'block';
                    focusFrame.style.left = (Math.random()*60+10) + '%';
                    focusFrame.style.top = (Math.random()*60+10) + '%';
                    eventBeacon.classList.remove('hidden');
                    try { alarmSound.play(); } catch(e) {}

                    // Log event (Throttle to 8 seconds)
                    const now = Date.now();
                    if (now - lastEventTime > 8000) {
                        lastEventTime = now;
                        await recordAnomalyEvent();
                    }
                } else {
                    focusFrame.style.display = 'none';
                    eventBeacon.classList.add('hidden');
                    alarmSound.pause();
                }
            }, 2500);
        }

        async function recordAnomalyEvent() {
            const video = document.getElementById('video-stream');
            let snapshotBase64 = "";

            try {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                if (ctx && video.readyState >= 2) {
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    snapshotBase64 = canvas.toDataURL('image/jpeg', 0.6);
                }
            } catch(e) { console.error('Snapshot failed', e); }

            try {
                await fetch('../api/cctv/events', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: new Date().toLocaleString(),
                        type: '움직임 이상 감지',
                        snapshot: snapshotBase64,
                        video_url: '#'
                    })
                });
            } catch (err) { console.error('Failed to save event to DB', err); }
        }

        async function stopCamera() {
            if (detectionInterval) {
                clearInterval(detectionInterval);
                detectionInterval = null;
            }
            document.getElementById('focus-frame').style.display = 'none';
            document.getElementById('event-beacon').classList.add('hidden');
            alarmSound.pause();

            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
                document.getElementById('rec-indicator').classList.add('hidden');

                // Save recording log
                if (recStartTime) {
                    const now = new Date();
                    const diffSec = Math.max(1, Math.floor((now - recStartTime) / 1000));
                    const size = (diffSec * (Math.random() * 0.5 + 0.2)).toFixed(2) + " MB";
                    const filename = `REC_${recStartTime.getFullYear()}${String(recStartTime.getMonth()+1).padStart(2,'0')}${String(recStartTime.getDate()).padStart(2,'0')}_${String(recStartTime.getHours()).padStart(2,'0')}${String(recStartTime.getMinutes()).padStart(2,'0')}.mp4`;
                    
                    try {
                        await fetch('../api/cctv/records', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                date: recStartTime.toLocaleString(),
                                filename,
                                size,
                                url: '#'
                            })
                        });
                    } catch(err) { console.error('Failed to save recording to DB', err); }
                    recStartTime = null;
                }
            }
        }

        function pauseCamera() {
            document.getElementById('video-stream').pause();
        }

        function exitApp() {
            stopCamera();
            alert("CCTV 시스템을 종료합니다.");
        }

        // Toggles size between default 1/2 size and full size
        function makeFullScreen() {
            const container = document.getElementById('video-container');
            container.classList.remove('max-w-2xl');
            container.classList.add('max-w-full', 'h-[75vh]');
        }

        function revertSize() {
            const container = document.getElementById('video-container');
            container.classList.remove('max-w-full', 'h-[75vh]');
            container.classList.add('max-w-2xl');
        }

        async function loadRecords() {
            const list = document.getElementById('record-list');
            list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">데이터 로딩 중...</td></tr>`;

            try {
                const res = await fetch('../api/cctv/records');
                const data = await res.json();
                if (data.success) {
                    list.innerHTML = "";
                    data.rows.forEach(r => {
                        const tr = document.createElement('tr');
                        tr.className = "border-b border-gray-800 hover:bg-gray-900 transition-colors";
                        tr.innerHTML = `
                            <td class="p-4 text-sm text-gray-400">${r.date}</td>
                            <td class="p-4 text-sm font-bold text-gray-300">${r.filename}</td>
                            <td class="p-4 text-sm text-yellow-500 font-bold digital-font">${r.size}</td>
                            <td class="p-4 text-sm">
                                <button class="bg-blue-600 hover:bg-blue-500 px-3 py-1.5 rounded-xl text-xs font-black transition-all">재생</button>
                            </td>
                        `;
                        list.appendChild(tr);
                    });
                    if (data.rows.length === 0) {
                        list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-600">저장된 녹화 정보가 없습니다.</td></tr>`;
                    }
                }
            } catch(e) {
                list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500">불러오기 실패</td></tr>`;
            }
        }

        async function loadEvents() {
            const list = document.getElementById('event-list');
            list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-500">데이터 로딩 중...</td></tr>`;

            try {
                const res = await fetch('../api/cctv/events');
                const data = await res.json();
                if (data.success) {
                    list.innerHTML = "";
                    data.rows.forEach(r => {
                        const tr = document.createElement('tr');
                        tr.className = "border-b border-gray-800 hover:bg-gray-900 transition-colors";
                        tr.innerHTML = `
                            <td class="p-4 text-sm text-gray-400">${r.timestamp}</td>
                            <td class="p-4 text-sm text-red-400 font-bold">${r.type}</td>
                            <td class="p-4">
                                ${r.snapshot ? `<img src="${r.snapshot}" class="w-20 h-12 object-cover rounded border border-gray-700 cursor-pointer hover:scale-250 transition-all"/>` : 'N/A'}
                            </td>
                            <td class="p-4 text-sm">
                                <button class="bg-red-600 hover:bg-red-500 px-3 py-1.5 rounded-xl text-xs font-black transition-all">분석</button>
                            </td>
                        `;
                        list.appendChild(tr);
                    });
                    if (data.rows.length === 0) {
                        list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-600">감지된 이상 이벤트가 없습니다.</td></tr>`;
                    }
                }
            } catch(e) {
                list.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-red-500">불러오기 실패</td></tr>`;
            }
        }
        
        showPage('settings');
    </script>
</body>
</html>
